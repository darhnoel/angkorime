<style>
    #app-preboot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
            radial-gradient(circle at top left, rgba(204, 121, 32, 0.18), transparent 24%),
            radial-gradient(circle at top right, rgba(171, 92, 37, 0.1), transparent 22%),
            linear-gradient(160deg, #fbf5ec 0%, #eedfcb 100%);
        color: #1f1710;
        transition: opacity 180ms ease, visibility 180ms ease;
    }

    #app-preboot-splash[data-hidden="true"] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .app-preboot-card {
        width: min(520px, 100%);
        border: 1px solid rgba(93, 68, 40, 0.14);
        border-radius: 28px;
        background: rgba(255, 251, 246, 0.94);
        box-shadow: 0 28px 80px rgba(74, 43, 18, 0.12);
        backdrop-filter: blur(14px);
        padding: 28px 24px;
        display: grid;
        gap: 12px;
        justify-items: center;
        text-align: center;
        font-family: "Noto Sans Khmer", "IBM Plex Sans", sans-serif;
    }

    .app-preboot-card h1 {
        margin: 0;
        font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .app-preboot-card p {
        margin: 0;
        color: #6d6053;
        font-size: 0.98rem;
        line-height: 1.5;
    }

    .app-preboot-spinner {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 3px solid rgba(177, 77, 30, 0.16);
        border-top-color: #b14d1e;
        animation: app-preboot-spin 0.9s linear infinite;
    }

    @keyframes app-preboot-spin {
        to {
            transform: rotate(360deg);
        }
    }
</style>
<script>
    (() => {
        function hideSplash() {
            const splash = document.getElementById("app-preboot-splash");
            if (!splash) return;
            splash.setAttribute("data-hidden", "true");
            window.setTimeout(() => splash.remove(), 220);
        }

        function shouldHideSplash() {
            const bodyReady = document.body && document.body.getAttribute("data-app-ready") === "1";
            const main = document.getElementById("main");
            return bodyReady || (main && main.childElementCount > 0);
        }

        function checkSplash() {
            if (shouldHideSplash()) {
                hideSplash();
                return true;
            }
            return false;
        }

        window.__hideAppPrebootSplash = hideSplash;
        document.addEventListener("readystatechange", checkSplash);
        window.addEventListener("load", checkSplash);
        const interval = window.setInterval(() => {
            if (checkSplash()) {
                window.clearInterval(interval);
            }
        }, 100);
    })();
</script>
